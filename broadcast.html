<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Broadcast Control</title>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f6f8;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #0f5bfa;
      --danger: #dc3545;
      --success: #28a745;
      --border: #e0e0e0;
      --warning: #ff9800;
      --offline: #9e9e9e;
      --desktop-bg: #e9ecef;
    }
    
    /* MOBILE FIRST BASE STYLES */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--desktop-bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .app-container {
      width: 100%;
      max-width: 1000px;
      display: flex;
      flex-direction: column;
      gap: 0; 
      flex-grow: 1;
    }

    .panel {
      background: var(--bg);
      padding: 20px;
      border-radius: 0;
      box-shadow: none;
      border: none;
      border-bottom: 1px solid var(--border);
    }
    .panel:last-child {
      border-bottom: none;
      flex-grow: 1; 
    }

    .panel-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 15px;
      border-bottom: 2px solid var(--surface);
      padding-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #systemStatusText {
      transition: color 0.3s ease;
      text-transform: capitalize;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: bold;
      color: var(--offline);
      padding: 4px 10px;
      border-radius: 6px;
      transition: all 0.3s;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--offline);
      transition: background-color 0.3s;
    }
    .is-blinking {
      animation: blink 1.2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Input & Form Styling */
    input, select, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      box-sizing: border-box;
      background: var(--bg);
      font-family: inherit;
      margin-bottom: 12px;
      font-size: 14px;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(15, 91, 250, 0.1);
    }
    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-right: 10px;
      margin-bottom: 0;
      cursor: pointer;
      accent-color: var(--accent);
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .toggle-wrapper {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: var(--text);
      text-transform: none;
      letter-spacing: 0;
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 15px 0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.1s;
    }
    button:active { transform: scale(0.98); }
    button:hover { background: #e9ecef; }

    /* Scene Grid */
    .scene-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .scene-btn {
      font-size: 13px;
      padding: 12px;
      background: var(--bg);
    }
    .scene-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: #f0f7ff;
      box-shadow: 0 2px 8px rgba(15, 91, 250, 0.15);
    }

    /* Effects Row */
    .effect-row {
      display: flex;
      gap: 10px;
    }
    .btn-fx {
      background: #343a40;
      color: white;
      font-size: 13px;
      flex: 1;
      padding: 12px;
      border: none;
    }
    .btn-fx:hover { filter: brightness(1.1); }
    
    .btn-action {
      background: #1a1a1a;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #218838; }

    .input-group {
      display: flex;
      gap: 10px;
    }
    .input-group > div { flex: 1; }
    .input-group > input { margin-bottom: 12px; }

    /* THEMATIC CONFIGURATION CARDS */
    .config-card {
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    
    .card-scenes { background: #f8f9fa; border: 1px solid #e9ecef; border-left: 5px solid var(--text); }
    .card-effects { background: #fff5f6; border: 1px solid #ffebee; border-left: 5px solid var(--danger); } /* Lightened */
    .card-branding { background: #f0f4ff; border: 1px solid #cce0ff; border-left: 5px solid var(--accent); }
    .card-custom { background: #f5f5f5; border: 1px solid #e0e0e0; border-left: 5px solid #616161; }

    /* DESKTOP RESPONSIVENESS */
    @media (min-width: 768px) {
      body {
        padding: 20px 0;
        justify-content: center;
      }
      .app-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        flex-grow: 0;
      }
      .panel {
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        border: 1px solid var(--border);
      }
      .scene-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }
  </style>
</head>
<body>

  <div class="app-container" id="main-app">
    
    <!-- LEFT COLUMN: Live Controls -->
    <div class="panel">
      <div class="panel-title">
        <span id="systemStatusText">Connecting...</span>
        <div class="live-badge" id="topBadge">
          <div class="dot" id="topBadgeDot"></div>
          <span id="topBadgeText">WAIT</span>
        </div>
      </div>

      <!-- Card: Scenes -->
      <div class="config-card card-scenes">
        <label style="color: var(--text);">Active Scene Switcher</label>
        <div class="scene-grid">
          <button class="scene-btn active" id="btn-scene-live" onclick="setScene('live')">1. Live Score</button>
          <button class="scene-btn" id="btn-scene-timer" onclick="setScene('timer')">2. Pre-Match</button>
          <button class="scene-btn" id="btn-scene-decision" onclick="setScene('decision')">3. Umpire</button>
          <button class="scene-btn" id="btn-scene-winner" onclick="setScene('winner')">4. Result</button>
          <button class="scene-btn" id="btn-scene-custom" onclick="setScene('custom')" style="grid-column: 1 / -1;">5. Custom Image Graphic</button>
        </div>
      </div>

      <!-- Combined Card: Resolution, Screen FX, Visual FX (Moved below Scenes) -->
      <div class="config-card card-effects" style="margin-bottom: 0;">
        <label style="color: var(--danger); font-size: 14px; margin-bottom: 12px;">Match Actions & Effects</label>
        
        <label>Visual Effects</label>
        <label class="toggle-wrapper" style="border-color: #ffcdd2; margin-bottom: 15px;">
          <input type="checkbox" id="particleToggle">
          Show Background Particles
        </label>

        <label>Screen Effects</label>
        <div class="effect-row" style="margin-bottom: 15px;">
          <button class="btn-fx" style="background: #0d47a1" onclick="triggerEffect('FOUR')">Four</button>
          <button class="btn-fx" style="background: #ad00b9" onclick="triggerEffect('SIX')">Six</button>
          <button class="btn-fx" style="background: var(--danger);" onclick="triggerEffect('OUT')">Out</button>
        </div>

        <label>Match Resolution</label>
        <button class="btn-action btn-success" onclick="declareResult()">Declare Winner / Result</button>
      </div>

    </div>

    <!-- RIGHT COLUMN: Setup & Configuration -->
    <div class="panel">
      
      <!-- Combined Card: Status, Branding, Timer (Moved to Right Column for balance) -->
      <div class="config-card card-branding">
        <label style="color: var(--accent); font-size: 14px; margin-bottom: 12px;">Match Status & Overlays</label>
        
        <label>Live Status</label>
        <input type="text" id="statusBar" placeholder="e.g. IND won toss" style="border-color: #b3d1ff;">

        <label>Top-Left Branding</label>
        <div class="input-group">
          <input type="text" id="brandTitle" placeholder="Heading" style="border-color: #b3d1ff;">
          <input type="text" id="brandSub" placeholder="Sub-text" style="border-color: #b3d1ff;">
        </div>
        <input type="text" id="brandLogo" placeholder="Logo URL" style="border-color: #b3d1ff;">

        <label>Timer Settings</label>
        <div style="display: flex; gap: 10px;">
          <!-- 3:1 Ratio for Timer inputs -->
          <input type="text" id="timerMessage" placeholder="Prefix" value="Starting in" style="flex: 3; border-color: #b3d1ff; margin-bottom: 0;">
          <input type="datetime-local" id="timerTarget" style="flex: 1; border-color: #b3d1ff; margin-bottom: 0;">
        </div>
      </div>

      <!-- Card: Custom Graphics -->
      <div class="config-card card-custom" style="margin-bottom: 0;">
        <label style="color: #616161; font-size: 14px; margin-bottom: 12px;">Custom Graphic Module</label>
        
        <div style="display: flex; gap: 6px; align-items: flex-start;">
          <input type="text" id="customImg" placeholder="Image URL" style="flex-grow: 1; border-color: #e0e0e0;">
          <button type="button" onclick="document.getElementById('customImg').value='https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1305&auto=format&fit=crop'; document.getElementById('customImg').dispatchEvent(new Event('change'));" style="padding: 0 12px; height: 42px; font-size: 11px; white-space: nowrap; border-radius: 8px; background: #e2e6ea; margin-bottom: 12px; border: 1px solid var(--border);">Placeholder</button>
        </div>
        
        <input type="text" id="customTitle" placeholder="Main Heading" style="border-color: #e0e0e0;">
        <input type="text" id="customText" placeholder="Sub-text" style="border-color: #e0e0e0;">
        
        <label style="font-size: 11px; margin-top: 5px; color: #616161;">HTML/CSS Injector</label>
        <textarea id="customHtml" placeholder="<div>Live</div>&#10;<style> body { background: none; } </style>" rows="4" style="font-family: monospace; font-size: 12px; resize: vertical; margin-bottom: 0; background: #1e1e1e; color: #d4d4d4; border-color: #333;"></textarea>
      </div>

    </div>
  </div>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      set,
      get,
      onValue,
      goOnline,
      goOffline
    } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    let state = {
      lastUpdated: 0,
      history: [],
      batTeam: "IND",
      bowlTeam: "AUS",
      runs: 0,
      wickets: 0,
      totalBalls: 0,
      maxOvers: 20,
      innings: 1,
      target: 0,
      thisOver: [],
      legalBallsThisOver: 0,
      activeScene: "live",
      statusBar: "Match starting soon...",
      winText: "",
      winSubText: "",
      effectType: "",
      effectTimestamp: 0,
      timerMessage: "MATCH STARTS IN",
      timerTarget: "",
      brandTitle: "",
      brandSub: "",
      brandLogo: "",
      customTitle: "",
      customText: "",
      customImg: "",
      customHtml: "", 
      showParticles: false 
    };

    let isConnected = false;
    let needsSync = false;

    function updateBadge(text, color, blink) {
      const badge = document.getElementById('topBadge');
      if (!badge) return;
      document.getElementById('topBadge').style.color = color;
      document.getElementById('topBadgeDot').style.backgroundColor = color;
      document.getElementById('topBadgeText').innerText = text;
      if (blink) badge.classList.add('is-blinking'); else badge.classList.remove('is-blinking');
    }

    function evaluateSystemStatus() {
      const sysStatus = document.getElementById('systemStatusText');
      if (!sysStatus) return;
      if (!navigator.onLine) {
        updateBadge("OFFLINE", "var(--warning)", false);
        sysStatus.innerText = "Saving Offline"; sysStatus.style.color = "var(--warning)";
      } else if (!isConnected) {
        updateBadge("NO DB", "var(--accent)", false);
        sysStatus.innerText = "No Server"; sysStatus.style.color = "var(--accent)";
      } else {
        updateBadge("LIVE", "var(--danger)", true);
        sysStatus.innerText = "Control Panel"; sysStatus.style.color = "var(--text)";
        if (needsSync) {
          set(matchRef, state); needsSync = false;
        }
      }
    }

    window.addEventListener('online', () => { goOnline(db); evaluateSystemStatus(); });
    window.addEventListener('offline', () => { goOffline(db); evaluateSystemStatus(); });
    onValue(connectedRef, (snap) => { isConnected = snap.val() === true; evaluateSystemStatus(); });

    onValue(matchRef, (snapshot) => {
      if (snapshot.exists()) {
        const dbState = snapshot.val();
        if (dbState.lastUpdated > state.lastUpdated) {
          state = dbState; updateUI();
        }
      }
    });

    window.setScene = (scene) => {
      state.activeScene = scene;
      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      const btn = document.getElementById('btn-scene-' + scene);
      if (btn) btn.classList.add('active');
      syncToFirebase();
    };

    window.triggerEffect = (type) => {
      state.effectType = type; state.effectTimestamp = Date.now(); syncToFirebase();
    };

    window.declareResult = () => {
      if (state.innings === 1) {
        alert("Match is still in 1st Innings!"); return;
      }
      let team1 = state.bowlTeam;
      let team2 = state.batTeam;
      let t1Score = state.target - 1;
      let t2Score = state.runs;

      if (t2Score >= state.target) {
        state.winText = `${team2} WINS`; state.winSubText = `by ${10 - state.wickets} wickets (Defeated ${team1})`;
      } else if (t2Score < t1Score) {
        state.winText = `${team1} WINS`; state.winSubText = `by ${t1Score - t2Score} runs (Defeated ${team2})`;
      } else {
        state.winText = "MATCH TIED"; state.winSubText = `Both teams scored ${t1Score} runs`;
      }
      window.setScene('winner');
    };

    function updateUI() {
      const safeUpdate = (id, value) => {
        const el = document.getElementById(id); 
        if (el && document.activeElement !== el) el.value = value ?? "";
      };
      safeUpdate('statusBar', state.statusBar); 
      safeUpdate('timerMessage', state.timerMessage); 
      safeUpdate('timerTarget', state.timerTarget);
      safeUpdate('brandTitle', state.brandTitle); 
      safeUpdate('brandSub', state.brandSub); 
      safeUpdate('brandLogo', state.brandLogo);
      safeUpdate('customTitle', state.customTitle); 
      safeUpdate('customText', state.customText); 
      safeUpdate('customImg', state.customImg);
      safeUpdate('customHtml', state.customHtml); 

      const particleToggle = document.getElementById('particleToggle');
      if(particleToggle) particleToggle.checked = !!state.showParticles;

      document.querySelectorAll('.scene-btn').forEach(btn => btn.classList.remove('active'));
      const activeBtn = document.getElementById('btn-scene-' + (state.activeScene || 'live'));
      if (activeBtn) activeBtn.classList.add('active');
    }

    async function syncToFirebase() {
      const getVal = (id, fallback) => {
        const el = document.getElementById(id);
        return el !== null ? el.value : fallback;
      };

      state.statusBar = getVal('statusBar', state.statusBar);
      state.timerMessage = getVal('timerMessage', state.timerMessage);
      state.timerTarget = getVal('timerTarget', state.timerTarget);
      state.brandTitle = getVal('brandTitle', state.brandTitle);
      state.brandSub = getVal('brandSub', state.brandSub);
      state.brandLogo = getVal('brandLogo', state.brandLogo);
      state.customTitle = getVal('customTitle', state.customTitle);
      state.customText = getVal('customText', state.customText);
      state.customImg = getVal('customImg', state.customImg);
      state.customHtml = getVal('customHtml', state.customHtml); 
      
      state.showParticles = document.getElementById('particleToggle')?.checked || false;
      state.lastUpdated = Date.now();

      updateUI();
      localStorage.setItem('admin_broadcast_backup', JSON.stringify(state));
      if (navigator.onLine && isConnected) {
        await set(matchRef, state).catch(e => console.warn("Firebase sync delayed")); needsSync = false;
      } else {
        needsSync = true;
      }
    }

    document.querySelectorAll('input, textarea').forEach(el => el.addEventListener('change', syncToFirebase));

    async function initSystem() {
      const localBackup = localStorage.getItem('admin_broadcast_backup');
      if (localBackup) {
        try {
          state = JSON.parse(localBackup); updateUI();
        } catch (e) {}
      }
      get(matchRef).then((snapshot) => {
        if (snapshot.exists()) {
          const firebaseState = snapshot.val();
          if (!state.lastUpdated || (firebaseState.lastUpdated > state.lastUpdated)) {
            state = firebaseState; 
            if (!state.thisOver) state.thisOver = []; 
            if (!state.history) state.history = []; 
            if (state.showParticles === undefined) state.showParticles = false; 
            if (state.customHtml === undefined) state.customHtml = "";
            updateUI();
          } else if (state.lastUpdated > firebaseState.lastUpdated) {
            set(matchRef, state);
          }
        } else {
          set(matchRef, state);
        }
        evaluateSystemStatus();
      });
    }
    initSystem();
  </script>
</body>
</html>
