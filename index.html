<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between selection:bg-indigo-500 selection:text-white">

    <!-- Empty spacing, no header brand name -->
    <header class="py-10"></header>

    <main class="flex-grow flex items-center justify-center w-full px-4 sm:px-6">
        <div class="max-w-4xl w-full space-y-10">
            
            <div class="text-center space-y-3">
                <h1 class="text-3xl font-bold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500">
                    Select Module
                </h1>
                <p class="text-sm font-medium text-slate-500">Choose a view to begin your session</p>
            </div>

            <!-- grid-cols-2 ensures two columns in one row on mobile devices -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-6">
                
                <!-- 1. Scoring (Blue/Cyan Gradient) -->
                <a href="score.html" class="group bg-gradient-to-br from-blue-500 to-cyan-400 p-6 rounded-3xl shadow-lg shadow-blue-500/20 hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-500/30 transition-all duration-300 flex flex-col items-center text-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-sm text-white flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-bold text-white tracking-wide">Scoring</h2>
                        <p class="text-[11px] sm:text-xs text-white/80 mt-1.5 font-medium leading-relaxed">For entering scores</p>
                    </div>
                </a>

                <!-- 2. View & Statistics (Purple/Fuchsia Gradient) -->
                <a href="view.html" class="group bg-gradient-to-br from-violet-500 to-fuchsia-500 p-6 rounded-3xl shadow-lg shadow-purple-500/20 hover:-translate-y-1 hover:shadow-xl hover:shadow-purple-500/30 transition-all duration-300 flex flex-col items-center text-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-sm text-white flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-bold text-white tracking-wide">View & Stats</h2>
                        <p class="text-[11px] sm:text-xs text-white/80 mt-1.5 font-medium leading-relaxed">View scores and statistics</p>
                    </div>
                </a>

                <!-- 3. OBS Overlay (Rose/Orange Gradient) -->
                <a href="live.html" class="group bg-gradient-to-br from-rose-500 to-orange-400 p-6 rounded-3xl shadow-lg shadow-orange-500/20 hover:-translate-y-1 hover:shadow-xl hover:shadow-orange-500/30 transition-all duration-300 flex flex-col items-center text-center gap-4 relative">
                    <!-- Live Indicator -->
                    <div class="absolute top-4 right-4 flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-white opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-white"></span>
                    </div>
                    <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-sm text-white flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-bold text-white tracking-wide">OBS Output</h2>
                        <p class="text-[11px] sm:text-xs text-white/80 mt-1.5 font-medium leading-relaxed">Transparent live feed</p>
                    </div>
                </a>

                <!-- 4. Broadcast Control (Emerald/Teal Gradient) -->
                <a href="broadcast.html" class="group bg-gradient-to-br from-emerald-500 to-teal-400 p-6 rounded-3xl shadow-lg shadow-emerald-500/20 hover:-translate-y-1 hover:shadow-xl hover:shadow-emerald-500/30 transition-all duration-300 flex flex-col items-center text-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-white/20 backdrop-blur-sm text-white flex items-center justify-center group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </div>
                    <div>
                        <h2 class="text-base font-bold text-white tracking-wide">Control</h2>
                        <p class="text-[11px] sm:text-xs text-white/80 mt-1.5 font-medium leading-relaxed">Scenes & custom graphics</p>
                    </div>
                </a>

            </div>
        </div>
    </main>

    <footer class="py-8 text-center mt-auto">
        <p class="text-sm font-medium text-slate-400">Designed by Roni</p>
    </footer>

</body>
</html>
