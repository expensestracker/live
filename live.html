<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pro OBS Overlay - Fully Responsive 16:9</title>
  <style>
    :root {
      /* Base Global UI Colors */
      --bg: #ffffff;
      --surface: #f4f6f8;
      --text: #1a1a1a;
      --text-muted: #666;
      --accent: #0f5bfa;
      --danger: #dc3545;
      --success: #28a745;
      --border: #e0e0e0;
      --warning: #ff9800;
      --offline: #ffffff;
      
      /* Live Scoreboard Specific Colors */
      --bg-main: #f2f6fa;
      --dark-blue: #0b132b;
      --aus-light: #1866e8;
      --aus-dark: #071d59;
      --aus-accent: #00d2ff;
      --ind-light: #0ea84d;
      --ind-dark: #06401d;
      --ind-accent: #5ef095;
      
      /* System Fonts */
      --font-display: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-base: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: transparent; /* Keep transparent for OBS capturing */
      font-family: var(--font-base);
      color: #111;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* * MASTER 16:9 CONTAINER 
     * Everything perfectly scales inside this container across all resolutions.
     */
    .master-container {
      container-type: inline-size;
      container-name: master;
      width: 100vw; 
      max-width: calc(100vh * 16 / 9);
      aspect-ratio: 16 / 9;
      position: relative;
      background-color: transparent;
      overflow: hidden;
    }

    /* Particle Canvas localized to Master Container */
    .particle-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      pointer-events: none;
      display: none;
    }

    /* GLOBAL SCENES SETUP */
    .scene {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
      pointer-events: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .scene.active {
      opacity: 1;
    }

    /* =========================================================
       SCENE 1: LIVE SCOREBOARD (Projector UI)
       ========================================================= */
    #scene-live {
      background: var(--bg-main);
      background-image: radial-gradient(circle at 50% 50%, #ffffff 0%, #eef3f9 100%);
      flex-direction: column;
      justify-content: space-between; 
      align-items: stretch; /* <--- CRITICAL FIX: Forces rows to take 100% width */
      padding: 1.5cqw;
      gap: 1.2cqw;
    }

    /* Header */
    .header {
      height: 4.8cqw;
      min-height: 4.8cqw;
      background: linear-gradient(90deg, #0d172e, #142245, #0d172e);
      border-radius: 0.8cqw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2cqw;
      color: white;
      font-weight: 700;
      position: relative;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.8cqw;
      font-size: 1.3cqw;
      letter-spacing: 0.05cqw;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    .header-left svg { width: 1.8cqw; height: 1.8cqw; fill: white; }
    
    .brand-logo {
      max-width: 2.5cqw;
      max-height: 2.5cqw;
      object-fit: contain;
      border-radius: 0.4cqw;
      margin-left: 0.5cqw;
    }

    .header-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      height: 100%;
      display: flex;
      align-items: center;
    }

    .match-badge-wrapper {
      background: linear-gradient(90deg, #00d2ff, #00ff88);
      padding: 0 0.15cqw 0.2cqw 0.15cqw;
      clip-path: polygon(1.5cqw 0, calc(100% - 1.5cqw) 0, 100% 100%, 0 100%);
      height: 100%;
    }

    .match-badge {
      background: #0b132b;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 3.5cqw;
      clip-path: polygon(1.4cqw 0, calc(100% - 1.4cqw) 0, 100% 100%, 0 100%);
      font-family: var(--font-display);
      font-size: 1.6cqw;
      letter-spacing: 0.1cqw;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1cqw;
      font-size: 1.1cqw;
      font-weight: 600;
    }

    .live-indicator { display: flex; align-items: center; gap: 0.5cqw; }
    .live-dot {
      width: 0.8cqw;
      height: 0.8cqw;
      background-color: #ff0044;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .divider { width: 0.1cqw; height: 1.5cqw; background: rgba(255,255,255,0.3); }

    /* Score Row */
    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex: 1; 
      min-height: 0; 
    }

    .team-card {
      height: 100%;
      width: 28%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: white;
      position: relative;
    }

    .aus-card {
      background: linear-gradient(120deg, var(--aus-light) 0%, var(--aus-dark) 100%);
      clip-path: polygon(0 0, 85% 0, 100% 100%, 0 100%);
      border-radius: 1.2cqw 0 0 1.2cqw;
      padding-left: 3.5cqw;
    }

    .ind-card {
      background: linear-gradient(-120deg, var(--ind-light) 0%, var(--ind-dark) 100%);
      clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
      border-radius: 0 1.2cqw 1.2cqw 0;
      padding-right: 3.5cqw;
      text-align: right;
      align-items: flex-end;
    }

    .team-name-row { display: flex; align-items: center; gap: 1cqw; }
    .team-name {
      font-family: var(--font-display);
      font-size: 8.5cqw;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.2cqw;
    }

    .team-icon { width: 4cqw; height: 4cqw; }

    .aus-card .team-status, .ind-card .team-status {
      font-weight: 700;
      letter-spacing: 0.1cqw;
      font-size: 1.2cqw;
      margin-top: -0.5cqw;
    }
    .aus-card .team-status { color: var(--aus-accent); margin-left: 0.5cqw; }
    .ind-card .team-status { color: var(--ind-accent); margin-right: 0.5cqw; }

    .score-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .main-runs {
      font-family: var(--font-display);
      font-size: 15cqw;
      font-weight: 800;
      line-height: 0.85;
      color: var(--dark-blue);
      display: flex;
      align-items: center;
      gap: 1cqw;
      letter-spacing: -0.4cqw;
    }
    .main-runs .dash { font-size: 8cqw; transform: translateY(-0.8cqw); }

    .overs-container {
      position: relative;
      width: 25cqw;
      display: flex;
      justify-content: center;
      margin-top: 1.5cqw;
    }

    .overs-line {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 0.15cqw; background: #d5dce6; z-index: 1;
    }
    .overs-line::before, .overs-line::after {
      content: ''; position: absolute; top: -0.15cqw; width: 0.5cqw; height: 0.5cqw; border-radius: 50%; background: #bdc5d1;
    }
    .overs-line::before { left: 0; }
    .overs-line::after { right: 0; }

    .overs-pill {
      position: relative; z-index: 2; background: var(--bg-main); padding: 0 1cqw; display: flex; align-items: center; gap: 0.6cqw; font-family: var(--font-display); font-size: 1.6cqw; font-weight: 700; color: var(--dark-blue);
    }
    .overs-val { background: var(--dark-blue); color: white; padding: 0.1cqw 1cqw; border-radius: 0.6cqw; font-size: 2.2cqw; }

    /* Stats Section */
    .stats-row {
      background: #ffffff;
      border-radius: 0.8cqw;
      display: flex;
      align-items: stretch; 
      box-shadow: 0 0.5cqw 1.5cqw rgba(0, 0, 0, 0.04);
      height: 12cqw; 
    }

    .stat-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 1cqw; }
    .stat-divider { width: 0.1cqw; background: #e4e9f0; margin: 1.5cqw 0; }

    .icon-wrapper {
      width: 3.5cqw; height: 3.5cqw; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 0.8cqw;
    }
    .icon-wrapper svg { width: 2cqw; height: 2cqw; }

    .stat-label {
      font-size: 1cqw; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1cqw; text-align: center; line-height: 1.2; margin-bottom: 0.2cqw;
    }
    .stat-value {
      font-family: var(--font-display); font-size: 4.2cqw; font-weight: 800; line-height: 1; letter-spacing: -0.1cqw;
    }

    .c-proj .icon-wrapper { background: #e6f0ff; }
    .c-proj svg { fill: #0066ff; }
    .c-proj .stat-value { color: #0066ff; }
    
    .c-need .icon-wrapper { background: #e6f7eb; }
    .c-need svg { fill: #00b347; }
    .c-need .stat-value { color: #00b347; }

    .c-balls .icon-wrapper { background: #fff6e6; }
    .c-balls svg { fill: #ffaa00; }
    .c-balls .stat-value { color: #ffb400; }

    .c-crr .icon-wrapper { background: #e6f0ff; }
    .c-crr svg { fill: #0066ff; }
    .c-crr .stat-value { color: #0066ff; }

    .c-rrr .icon-wrapper { background: #ffebeb; }
    .c-rrr svg { fill: #ff3333; }
    .c-rrr .stat-value { color: #ff3333; }

    /* Timeline Section */
    .timeline-wrapper {
      background: #ffffff;
      border-radius: 0.8cqw;
      box-shadow: 0 0.5cqw 1.5cqw rgba(0, 0, 0, 0.04);
      height: 6cqw; display: flex; align-items: center; padding: 0 2cqw; gap: 1.5cqw;
    }
    .timeline-label {
      font-size: 1.1cqw; font-weight: 800; color: #1a2538; text-transform: uppercase; letter-spacing: 0.1cqw; border-right: 0.15cqw solid #e4e9f0; padding-right: 1.5cqw;
    }
    .timeline {
      display: flex; align-items: center; gap: 0.8cqw; flex: 1; height: 100%; overflow: hidden; 
    }
    .timeline .ball {
      min-width: 2.8cqw; height: 2.8cqw; padding: 0 0.6cqw; box-sizing: border-box; border-radius: 1.4cqw; display: flex; align-items: center; justify-content: center; font-size: 1.2cqw; font-weight: 800; font-family: var(--font-display); white-space: nowrap;
    }

    /* Bottom Bar */
    .footer-wrapper {
      height: 5cqw; min-height: 5cqw; position: relative; background: linear-gradient(90deg, #0055ff, #00d2ff, #0055ff); clip-path: polygon(1.5cqw 0, calc(100% - 1.5cqw) 0, 100% 100%, 0 100%); padding: 0 0.15cqw 0.2cqw 0.15cqw; 
    }
    .footer-inner {
      height: 100%; background: linear-gradient(90deg, #010a1c, #07193d, #010a1c); clip-path: polygon(1.4cqw 0, calc(100% - 1.4cqw) 0, 100% 100%, 0 100%); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.7cqw; font-weight: 600; position: relative; letter-spacing: 0.05cqw;
    }
    .footer-inner::before, .footer-inner::after {
      content: ''; position: absolute; top: 0; bottom: 0; width: 25cqw; background-image: radial-gradient(#0055ff 0.15cqw, transparent 0.15cqw); background-size: 0.8cqw 0.8cqw; background-position: 0 0; z-index: 1; opacity: 0.6;
    }
    .footer-inner::before { mask-image: linear-gradient(90deg, black, transparent); -webkit-mask-image: linear-gradient(90deg, black, transparent); left: 0; }
    .footer-inner::after { mask-image: linear-gradient(-90deg, black, transparent); -webkit-mask-image: linear-gradient(-90deg, black, transparent); right: 0; }
    .footer-content { position: relative; z-index: 2; }
    .f-blue { color: #00d2ff; font-weight: 800; font-family: var(--font-display); font-size: 2.2cqw; margin: 0 0.3cqw; vertical-align: middle; }
    .f-yellow { color: #ffcc00; font-weight: 800; font-family: var(--font-display); font-size: 2.2cqw; margin: 0 0.3cqw; vertical-align: middle;}

    /* =========================================================
       SCENE 2: TIMER
       ========================================================= */
    .timer-scene {
      flex-direction: column;
    }
    .timer-title {
      font-size: 3cqw; color: var(--accent); letter-spacing: 0.3cqw; font-weight: bold; text-shadow: 0 0.3cqw 1.5cqw rgba(0,0,0,0.8);
    }
    .countdown {
      font-size: 10cqw; font-weight: bold; color: var(--bg); font-variant-numeric: tabular-nums; text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.8);
    }

    /* =========================================================
       SCENE 3: DECISION PENDING
       ========================================================= */
    .decision-scene {
      background: #ff102876;
      flex-direction: column;
      animation: heartbeat 2s infinite;
    }
    .decision-text {
      font-size: 4.5cqw; color: var(--bg); font-weight: bold; letter-spacing: 0.4cqw; text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.9), 0 0.2cqw 0.5cqw rgba(0,0,0,1); padding: 1cqw 2cqw;
    }
    .decision-sub {
      font-size: 3cqw; color: var(--bg); text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.9), 0 0.2cqw 0.5cqw rgba(0,0,0,1);
    }

    /* =========================================================
       SCENE 4: WINNER
       ========================================================= */
    .winner-content {
      text-align: center;
      animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      background: var(--surface);
      padding: 3cqw 5cqw;
      border-radius: 1.5cqw;
      border: 0.3cqw solid var(--warning);
      box-shadow: 0 1cqw 4cqw rgba(0,0,0,0.5);
    }
    .trophy { font-size: 8cqw; margin-bottom: 0.5cqw; }
    .winner-text { font-size: 4.5cqw; color: #0056b3; margin-bottom: 0.8cqw; }
    .winner-sub { font-size: 2cqw; color: #333; font-weight: bold; }

    /* =========================================================
       SCENE 5: CUSTOM GRAPHIC / HTML SANDBOX
       ========================================================= */
    .custom-scene {
      flex-direction: column;
      justify-content: flex-end;
      text-align: center;
      padding-bottom: 8cqw;
    }
    .custom-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1;
    }
    .custom-title {
      font-size: 5cqw; color: var(--bg); letter-spacing: 0.2cqw; z-index: 2; position: relative; text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.9), 0 0.2cqw 0.5cqw rgba(0,0,0,1);
    }
    .custom-text {
      font-size: 3.2cqw; color: var(--bg); font-weight: bold; max-width: 80%; line-height: 1.4; z-index: 2; position: relative; margin-bottom: 5cqw; text-shadow: 0 0.5cqw 2cqw rgba(0,0,0,0.9), 0 0.2cqw 0.5cqw rgba(0,0,0,1);
    }
    .custom-html-frame {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; background: transparent; pointer-events: none;
    }

    /* =========================================================
       VISUAL EFFECTS LAYER
       ========================================================= */
    .effect-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease-out; perspective: 1000px;
    }
    .effect-text {
      font-size: 15cqw; font-weight: 900; text-transform: uppercase; letter-spacing: -0.2cqw; transform: scale(0.5);
    }
    .effect-layer.show { opacity: 1; }
    .effect-layer.show .effect-text { animation: blast 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .fx-four { color: var(--accent); text-shadow: 0 0 0px var(--accent), 0 1cqw 2cqw rgba(0,0,0,0.5); }
    .fx-six { color: var(--warning); text-shadow: 0 0 1.5cqw var(--warning), 0 1cqw 2cqw rgba(0,0,0,0.5); }
    .fx-out { color: var(--danger); text-shadow: 0 1cqw 2cqw rgba(0,0,0,0.5); }

    /* =========================================================
       KEYFRAMES
       ========================================================= */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
    @keyframes heartbeat {
      0%, 100% { background: #ff102876; }
      50% { background: #ff1028b0; }
    }
    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes blast {
      0% { transform: scale(0.2) translateY(3cqw) rotateX(-40deg) rotate(-10deg); opacity: 0; }
      15% { transform: scale(1.15) translateY(-0.5cqw) rotateX(10deg) rotate(5deg); opacity: 1; }
      25% { transform: scale(1) translateY(0) rotateX(0deg) rotate(0deg); opacity: 1; }
      80% { transform: scale(1.05) translateY(-0.2cqw); opacity: 1; }
      100% { transform: scale(1.4) translateY(-1.5cqw); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="master-container" id="masterContainer">

    <canvas id="particleCanvas" class="particle-canvas"></canvas>

    <div class="scene active" id="scene-live">
      
      <header class="header">
        <div class="header-left" id="brandingBox">
          <svg viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 10.63 21 8.55 21 6V7c0-1.1-.9-2-2-2zM7 11c-1.1 0-2-.9-2-2V7h2v4zm12-2c0 1.1-.9 2-2 2V7h2v2z"/></svg>
          <span id="brandTitleText">INDIA T20</span>
          <img id="brandLogoImg" src="" class="brand-logo" style="display: none;">
        </div>
        <div class="header-center">
          <div class="match-badge-wrapper" id="brandSubBox">
            <div class="match-badge" id="brandSubText">MATCH 01</div>
          </div>
        </div>
        <div class="header-right">
          <div class="live-indicator" id="liveIndicator">
            <div class="live-dot" id="liveDot"></div>
            <span id="liveText">LIVE</span>
          </div>
          <div class="divider"></div>
          <span id="systemClock">05:27 PM</span>
        </div>
      </header>

      <main class="score-row">
        <div class="team-card aus-card">
          <div class="team-name-row">
            <span class="team-name" id="batTeam">AUS</span>
            <svg class="team-icon" viewBox="0 0 24 24" fill="none" style="transform: rotate(20deg) translateY(-10%);">
              <path d="M14.5 3.5L16.5 5.5L7.5 14.5C6 16 4 16.5 3 15.5C2 14.5 2.5 12.5 4 11L13 2L14.5 3.5Z" fill="#ffb400"/>
              <path d="M16 2.5L17.5 4" stroke="#ffb400" stroke-width="2" stroke-linecap="round"/>
              <circle cx="18" cy="14" r="3" fill="#ff0044"/>
              <path d="M16.5 13A2 2 0 0 1 19.5 15" stroke="white" stroke-width="1" stroke-linecap="round" stroke-dasharray="1 1"/>
            </svg>
          </div>
          <div class="team-status">BATTING</div>
        </div>

        <div class="score-center">
          <div class="main-runs">
            <span id="score">0</span> <span class="dash">-</span> <span id="wickets">0</span>
          </div>
          <div class="overs-container">
            <div class="overs-line"></div>
            <div class="overs-pill">
              <span class="overs-val" id="overs">0.0</span> <span>OVERS</span>
            </div>
          </div>
        </div>

        <div class="team-card ind-card">
          <div class="team-name-row" style="justify-content: flex-end;">
            <svg class="team-icon" viewBox="0 0 24 24" fill="none" style="transform: translateY(-10%);">
              <circle cx="12" cy="12" r="10" fill="white"/>
              <path d="M7 5C9 8 9 16 7 19" stroke="#ff0044" stroke-width="1.5" stroke-dasharray="2 2"/>
              <path d="M17 5C15 8 15 16 17 19" stroke="#ff0044" stroke-width="1.5" stroke-dasharray="2 2"/>
            </svg>
            <span class="team-name" id="bowlTeam">IND</span>
          </div>
          <div class="team-status">BOWLING</div>
        </div>
      </main>

      <section class="stats-row">
        
        <div class="stat-col c-proj" id="colProj" style="display:none;">
          <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm0-14c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4zm0-7c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/></svg>
          </div>
          <div class="stat-label">Projected Score</div>
          <div class="stat-value" id="proj">0</div>
        </div>

        <div class="stat-col c-need" id="colNeed">
          <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"/></svg>
          </div>
          <div class="stat-label">Needed Runs</div>
          <div class="stat-value" id="need">0</div>
        </div>
        
        <div class="stat-divider" id="divNeed"></div>

        <div class="stat-col c-balls" id="colBalls">
          <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><circle cx="15" cy="12" r="6"/><path d="M2 12h5M4 8h4M4 16h4" stroke-width="2" stroke-linecap="round" stroke="currentColor"/></svg>
          </div>
          <div class="stat-label">Remaining Balls</div>
          <div class="stat-value" id="ballsLeft">0</div>
        </div>

        <div class="stat-divider" id="divBalls"></div>

        <div class="stat-col c-crr">
          <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/><path d="M3 22h18v-2H3v2z"/></svg>
          </div>
          <div class="stat-label">Current Run Rate</div>
          <div class="stat-value" id="crr">0.00</div>
        </div>
        
        <div class="stat-divider" id="divRrr"></div>

        <div class="stat-col c-rrr" id="colRrr">
          <div class="icon-wrapper">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 2.21.71 4.25 1.9 5.92L5.32 16.5C4.49 15.22 4 13.67 4 12c0-4.42 3.58-8 8-8s8 3.58 8 8c0 1.67-.49 3.22-1.32 4.5l1.42 1.42C21.29 16.25 22 14.21 22 12c0-5.52-4.48-10-10-10zm-1 12h2v4h-2zm1-8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
          </div>
          <div class="stat-label">Required Run Rate</div>
          <div class="stat-value" id="rrr">0.00</div>
        </div>
      </section>

      <div class="timeline-wrapper">
        <div class="timeline-label">Recent</div>
        <div class="timeline" id="timeline"></div>
      </div>

      <footer class="footer-wrapper">
        <div class="footer-inner">
          <div class="footer-content" id="statusBarDisplay">
            Welcome to the match
          </div>
        </div>
      </footer>

    </div>

    <div class="scene timer-scene" id="scene-timer">
      <div class="timer-title" id="timerTitle">Starting in</div>
      <div class="countdown" id="countdownTimer">00:00:00</div>
    </div>

    <div class="scene decision-scene" id="scene-decision">
      <div class="decision-text">Decision Pending</div>
      <div class="decision-sub">Review in Progress</div>
    </div>

    <div class="scene winner-scene" id="scene-winner">
      <div class="winner-content">
        <div class="trophy">🏆</div>
        <div class="winner-text" id="winnerText">Team Wins</div>
        <div class="winner-sub" id="winSubText">by 0 runs</div>
      </div>
    </div>

    <div class="scene custom-scene" id="scene-custom">
      <img id="customGraphicImgDisplay" src="" class="custom-img" style="display:none;">
      <div class="custom-title" id="customTitleText"></div>
      <div class="custom-text" id="customSubText"></div>
      <iframe id="customHtmlFrame" class="custom-html-frame" sandbox="allow-scripts allow-same-origin" style="display:none;"></iframe>
    </div>

    <div class="effect-layer" id="effectLayer">
      <div class="effect-text" id="effectText"></div>
    </div>

  </div> <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
    import { getDatabase, ref, onValue, goOnline, goOffline } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBmXewXcQQt97EJzbKceLbCoTTG_9aJlJI",
      authDomain: "bhaskarjyoticlub.firebaseapp.com",
      databaseURL: "https://bhaskarjyoticlub-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "bhaskarjyoticlub",
      storageBucket: "bhaskarjyoticlub.firebasestorage.app",
      messagingSenderId: "730168687443",
      appId: "1:730168687443:web:479bedc258bd9dd06fffa6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const matchRef = ref(db, 'broadcast_state');
    const connectedRef = ref(db, ".info/connected");

    // --- PARTICLE ENGINE ---
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d');
    const masterContainer = document.getElementById('masterContainer');
    let particlesArray = [];
    let particlesEnabled = false;
    let animationFrameId;

    // Link canvas size strictly to 16:9 master container limits
    function resizeCanvas() {
      canvas.width = masterContainer.offsetWidth;
      canvas.height = masterContainer.offsetHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    // Initialize size once on load
    resizeCanvas();

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 1;
        this.speedX = (Math.random() - 0.5) * 1.2;
        this.speedY = (Math.random() - 0.5) * 1.2;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
        if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
      }
      draw() {
        ctx.fillStyle = '#0f5bfa';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particlesArray = [];
      for (let i = 0; i < 70; i++) {
        particlesArray.push(new Particle());
      }
    }

    function animateParticles() {
      if (!particlesEnabled) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();

        for (let j = i; j < particlesArray.length; j++) {
          const dx = particlesArray[i].x - particlesArray[j].x;
          const dy = particlesArray[i].y - particlesArray[j].y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          // Connecting line based on canvas scaling
          const maxDistance = canvas.width * 0.08; // Roughly 8% of screen width

          if (distance < maxDistance) {
            ctx.beginPath();
            const opacity = 1 - (distance / maxDistance);
            ctx.strokeStyle = `rgba(15, 91, 250, ${opacity * 0.5})`;
            ctx.lineWidth = 4;
            ctx.moveTo(particlesArray[i].x, particlesArray[i].y);
            ctx.lineTo(particlesArray[j].x, particlesArray[j].y);
            ctx.stroke();
            ctx.closePath();
          }
        }
      }
      animationFrameId = requestAnimationFrame(animateParticles);
    }

    // System Clock
    setInterval(() => {
      const clockEl = document.getElementById('systemClock');
      if(clockEl) {
          clockEl.innerText = new Date().toLocaleTimeString('en-IN', {
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
          }).toUpperCase();
      }
    }, 1000);

    // --- CONNECTION HANDLING ---
    let isConnected = false;

    function evaluateConnection() {
      const indicator = document.getElementById('liveIndicator');
      const dot = document.getElementById('liveDot');
      const text = document.getElementById('liveText');
      if(!indicator) return;

      if (!navigator.onLine) {
        indicator.style.color = 'var(--offline)';
        dot.style.background = 'var(--offline)';
        dot.style.animation = 'none';
        text.innerText = 'OFFLINE';
      } else if (!isConnected) {
        indicator.style.color = 'var(--aus-accent)';
        dot.style.background = 'var(--aus-accent)';
        dot.style.animation = 'none';
        text.innerText = 'SYNCING';
      } else {
        indicator.style.color = 'var(--bg-main)';
        dot.style.background = '#ff0044';
        dot.style.animation = 'pulse 1.5s infinite';
        text.innerText = 'LIVE';
      }
    }

    window.addEventListener('online', () => { goOnline(db); evaluateConnection(); });
    window.addEventListener('offline', () => { goOffline(db); evaluateConnection(); });
    onValue(connectedRef, (snap) => { isConnected = snap.val() === true; evaluateConnection(); });

    // --- MAIN DATA HANDLING ---
    let lastEffectTime = 0;
    let timerInterval = null;

    onValue(matchRef, (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // Particle Control
      if (data.showParticles && !particlesEnabled) {
        particlesEnabled = true; canvas.style.display = 'block'; initParticles(); animateParticles();
      } else if (!data.showParticles && particlesEnabled) {
        particlesEnabled = false; canvas.style.display = 'none'; cancelAnimationFrame(animationFrameId); ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      // Scenes
      document.querySelectorAll('.scene').forEach(el => el.classList.remove('active'));
      const activeSceneEl = document.getElementById('scene-' + (data.activeScene || 'live'));
      if (activeSceneEl) activeSceneEl.classList.add('active');

      // Branding Header Variables 
      const hasBranding = data.brandTitle || data.brandLogo;
      document.getElementById('brandingBox').style.display = hasBranding ? 'flex': 'none';
      
      const logoEl = document.getElementById('brandLogoImg');
      if (data.brandLogo) {
        logoEl.src = data.brandLogo; logoEl.style.display = 'block';
      } else {
        logoEl.style.display = 'none';
      }
      document.getElementById('brandTitleText').innerText = data.brandTitle || "LIVE MATCH";

      document.getElementById('brandSubBox').style.display = data.brandSub ? 'flex': 'none';
      document.getElementById('brandSubText').innerText = data.brandSub || "";

      // Custom Graphic Scene & Custom HTML Injector Processing
      const customImgEl = document.getElementById('customGraphicImgDisplay');
      if (data.customImg) {
        customImgEl.src = data.customImg; customImgEl.style.display = 'block';
      } else {
        customImgEl.style.display = 'none';
      }
      document.getElementById('customTitleText').innerText = data.customTitle || "";
      document.getElementById('customTitleText').style.display = data.customTitle ? 'block': 'none';
      document.getElementById('customSubText').innerText = data.customText || "";
      document.getElementById('customSubText').style.display = data.customText ? 'block': 'none';

      // Iframe Sandbox Injector
      const customFrame = document.getElementById('customHtmlFrame');
      if (data.customHtml && data.customHtml.trim() !== "") {
        if (customFrame.srcdoc !== data.customHtml) { customFrame.srcdoc = data.customHtml; }
        customFrame.style.display = 'block';
      } else {
        if (customFrame.srcdoc !== "") { customFrame.srcdoc = ""; }
        customFrame.style.display = 'none';
      }

      // Timer Logic
      document.getElementById('timerTitle').innerText = data.timerMessage || "Starting in";
      clearInterval(timerInterval);
      if (data.timerTarget) {
        timerInterval = setInterval(() => {
          const diff = new Date(data.timerTarget).getTime() - new Date().getTime();
          if (diff < 0) {
            document.getElementById('countdownTimer').innerText = "00:00:00";
          } else {
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('countdownTimer').innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
          }
        }, 1000);
      } else {
        document.getElementById('countdownTimer').innerText = "00:00:00";
      }

      // Winner Data
      document.getElementById('winnerText').innerText = data.winText || "VICTORY!";
      document.getElementById('winSubText').innerText = data.winSubText || "";

      // Score Data
      document.getElementById('statusBarDisplay').innerHTML = data.statusBar || "Welcome to the match";
      document.getElementById('batTeam').innerText = data.batTeam || "IND";
      document.getElementById('score').innerText = data.runs || 0;
      document.getElementById('wickets').innerText = data.wickets || 0;
      document.getElementById('overs').innerText = Math.floor((data.totalBalls || 0) / 6) + "." + ((data.totalBalls || 0) % 6);
      document.getElementById('bowlTeam').innerText = data.bowlTeam || "AUS";

      // Stats Logic mapped to 16:9 UI
      const oversDec = (data.totalBalls || 0) / 6;
      const crr = data.totalBalls > 0 ? ((data.runs || 0) / oversDec).toFixed(2): "0.00";
      document.getElementById('crr').innerText = crr;
      
      const ballsLeft = ((data.maxOvers || 20) * 6) - (data.totalBalls || 0);
      document.getElementById('ballsLeft').innerText = ballsLeft > 0 ? ballsLeft : 0;

      // Handle Toggling Based on Innings
      const colProj = document.getElementById('colProj');
      const colNeed = document.getElementById('colNeed');
      const divNeed = document.getElementById('divNeed');
      const colBalls = document.getElementById('colBalls');
      const divBalls = document.getElementById('divBalls');
      const colRrr = document.getElementById('colRrr');
      const divRrr = document.getElementById('divRrr');

      if (data.innings === 2) {
        if(colProj) colProj.style.display = "none";
        if(colNeed) colNeed.style.display = "flex";
        if(divNeed) divNeed.style.display = "block";
        if(colBalls) colBalls.style.display = "flex";
        if(divBalls) divBalls.style.display = "block";
        if(colRrr) colRrr.style.display = "flex";
        if(divRrr) divRrr.style.display = "block";
        
        const runsNeeded = (data.target || 0) - (data.runs || 0);
        document.getElementById('need').innerText = runsNeeded > 0 ? runsNeeded : 0;
        document.getElementById('rrr').innerText = ballsLeft > 0 ? (runsNeeded / (ballsLeft / 6)).toFixed(2) : "0.00";
      } else {
        if(colNeed) colNeed.style.display = "none";
        if(divNeed) divNeed.style.display = "none";
        if(colRrr) colRrr.style.display = "none";
        if(divRrr) divRrr.style.display = "none";
        
        if(colProj) colProj.style.display = "flex";
        if(colBalls) colBalls.style.display = "flex";
        if(divBalls) divBalls.style.display = "block";
        
        if(document.getElementById('proj')) {
          document.getElementById('proj').innerText = Math.round(crr * (data.maxOvers || 20));
        }
      }

      // Timeline Logic
      const timelineDiv = document.getElementById('timeline');
      if (data.thisOver && data.thisOver.length > 0) {
        timelineDiv.innerHTML = data.thisOver.map(ball => {
          let bg = "#e0e0e0", color = "#000";
          if (ball === 'W') { bg = "#dc3545"; color = "#fff"; }
          if (ball === '4') { bg = "#0056b3"; color = "#fff"; }
          if (ball === '6') { bg = "#dc3545"; color = "#fff"; }
          return `<div class="ball" style="background:${bg}; color:${color}">${ball}</div>`;
        }).join('');
      } else {
        timelineDiv.innerHTML = "";
      }

      // Action Effects
      if (data.effectTimestamp > lastEffectTime) {
        lastEffectTime = data.effectTimestamp;
        if (Date.now() - data.effectTimestamp < 4000) {
          const fxLayer = document.getElementById('effectLayer');
          const fxText = document.getElementById('effectText');
          fxText.className = 'effect-text';
          if (data.effectType === 'FOUR') { fxText.innerText = "4"; fxText.classList.add('fx-four'); } 
          else if (data.effectType === 'SIX') { fxText.innerText = "6"; fxText.classList.add('fx-six'); } 
          else if (data.effectType === 'OUT') { fxText.innerText = "Wicket"; fxText.classList.add('fx-out'); }
          fxLayer.classList.remove('show');
          void fxLayer.offsetWidth;
          fxLayer.classList.add('show');
          setTimeout(() => fxLayer.classList.remove('show'), 3000);
        }
      }
    });

    evaluateConnection();
  </script>
</body>
</html>
